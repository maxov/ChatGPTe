<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      --toolbar-bg: oklch(96.8% 0.003 260);
      --toolbar-border: rgb(5 5 6 / 0.12);
      --button-bg: transparent;
      --button-border: transparent;
      --button-hover-bg: rgb(5 5 6 / 0.06);
      --button-hover-border: transparent;
      --button-active-bg: rgb(5 5 6 / 0.1);
      --button-focus-ring: oklch(65% 0.12 175);
      --icon-color: oklch(27% 0.006 260);
      --icon-disabled-color: oklch(62% 0.006 260);
      --title-color: oklch(27% 0.006 260);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 40px;
      display: flex;
      align-items: center;
      -webkit-app-region: drag;
      user-select: none;
      background: var(--toolbar-bg);
      border-bottom: 0.5px solid var(--toolbar-border);
    }

    @media (prefers-color-scheme: dark) {
      body {
        --toolbar-bg: oklch(25.5% 0.004 260);
        --toolbar-border: rgb(246 248 250 / 0.11);
        --button-bg: rgb(246 248 250 / 0.06);
        --button-border: rgb(246 248 250 / 0.11);
        --button-hover-bg: rgb(246 248 250 / 0.13);
        --button-hover-border: rgb(246 248 250 / 0.2);
        --button-active-bg: rgb(246 248 250 / 0.18);
        --button-focus-ring: oklch(72% 0.11 175);
        --icon-color: oklch(91% 0.006 260);
        --icon-disabled-color: oklch(56% 0.006 260);
        --title-color: oklch(83% 0.006 260);
      }
    }

    .spacer {
      width: 8px;
      flex-shrink: 0;
    }

    body[data-platform="darwin"] .spacer {
      width: 70px;
    }

    .nav-btn {
      -webkit-app-region: no-drag;
      border: 1px solid var(--button-border);
      background: var(--button-bg);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 2px;
      transition: background-color 150ms ease, border-color 150ms ease;
    }

    .nav-btn:not(:disabled):hover {
      background: var(--button-hover-bg);
      border-color: var(--button-hover-border);
    }

    .nav-btn:not(:disabled):active {
      background: var(--button-active-bg);
    }

    .nav-btn:focus-visible {
      outline: 2px solid var(--button-focus-ring);
      outline-offset: -2px;
    }

    .nav-btn:disabled {
      cursor: default;
      opacity: 1;
      background: transparent;
      border-color: transparent;
    }

    .nav-btn svg {
      width: 16px;
      height: 16px;
      stroke: var(--icon-color);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-btn:disabled svg {
      stroke: var(--icon-disabled-color);
    }

    .title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--title-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 12px;
    }
  </style>
</head>
<body>
  <script>
    document.body.dataset.platform =
      new URLSearchParams(window.location.search).get("platform") || "";
  </script>
  <div class="spacer"></div>
  <button id="back" class="nav-btn" disabled title="Back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button id="forward" class="nav-btn" disabled title="Forward">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
  </button>
  <span id="title" class="title"></span>
  <button id="reload" class="nav-btn" title="Reload">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
  </button>

  <script>
    const backBtn = document.getElementById("back");
    const fwdBtn = document.getElementById("forward");
    const reloadBtn = document.getElementById("reload");

    backBtn.addEventListener("click", () => window.electronNav.goBack());
    fwdBtn.addEventListener("click", () => window.electronNav.goForward());
    reloadBtn.addEventListener("click", () => window.electronNav.reload());

    window.electronNav.onNavState((state) => {
      backBtn.disabled = !state.canGoBack;
      fwdBtn.disabled = !state.canGoForward;
    });

    const titleEl = document.getElementById("title");
    window.electronNav.onTitleUpdate((title) => {
      titleEl.textContent = title;
    });
  </script>
</body>
</html>
